services:
  spherix:
    image: ghcr.io/1899nils/spherix:latest
    container_name: spherix
    restart: unless-stopped
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - PUBLIC_URL=${PUBLIC_URL:-}
      # ── Admin-Zugangsdaten ──────────────────────────────────────────────────
      # ADMIN_USERNAME: Benutzername des initialen Admin-Kontos (Standard: admin)
      # ADMIN_PASSWORD: Wenn gesetzt, wird das Admin-Passwort bei jedem Start
      #                 auf diesen Wert zurückgesetzt — ideal zur Passwort-
      #                 Wiederherstellung. Nach dem Login wieder entfernen!
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - MUSIC_PATH=/music
      - VIDEO_PATH=/videos
      - AUDIOBOOK_PATH=/audiobooks
    ports:
      - "80:80"
      - "3000:3000"
    volumes:
      # ── Persistente Daten ──────────────────────────────────────────────
      # spherix_data ist ein Docker-verwaltetes Volume — bleibt auch bei
      # Container-Updates, Neuerstellungen und Reboots erhalten.
      # Nur "docker volume rm spherix_data" löscht es wirklich.
      #
      # Für eigenen Pfad (Unraid/NAS/Synology): diese Zeile ersetzen durch:
      #   - /mnt/user/appdata/spherix:/data
      - spherix_data:/data

      # ── Mediatheken ────────────────────────────────────────────────────
      # Pfade in .env konfigurieren (MUSIC_DIR, VIDEO_DIR, AUDIOBOOK_DIR)
      - ${MUSIC_DIR:-/tmp/spherix-music}:/music:ro
      - ${VIDEO_DIR:-/tmp/spherix-videos}:/videos:ro
      - ${AUDIOBOOK_DIR:-/tmp/spherix-audiobooks}:/audiobooks:ro

# Docker-verwaltetes Volume — wird automatisch angelegt und niemals
# automatisch gelöscht (außer mit "docker volume rm spherix_data").
volumes:
  spherix_data:
    name: spherix_data
