services:
  spherix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spherix
    restart: unless-stopped
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - MUSIC_PATH=/music
      - VIDEO_PATH=/videos
      - AUDIOBOOK_PATH=/audiobooks
    ports:
      - "80:80"
      - "3000:3000"
    volumes:
      # ── Persistente Daten ──────────────────────────────────────────────
      # DATA_PATH steuert wo Spherix seine Daten ablegt.
      # Standard: ./data  (neben dieser docker-compose.yml)
      # Für Unraid/NAS: DATA_PATH=/mnt/user/appdata/spherix in .env setzen
      # WICHTIG: data/ niemals manuell löschen und KEIN "docker compose down -v"!
      - ${DATA_PATH:-./data}:/data

      # ── Mediatheken ────────────────────────────────────────────────────
      # Pfade in .env konfigurieren (MUSIC_DIR, VIDEO_DIR, AUDIOBOOK_DIR)
      - ${MUSIC_DIR:-/pfad/zu/deiner/musik}:/music:ro
      - ${VIDEO_DIR:-/pfad/zu/deinen/videos}:/videos:ro
      - ${AUDIOBOOK_DIR:-/pfad/zu/deinen/hoerbuechern}:/audiobooks:ro
