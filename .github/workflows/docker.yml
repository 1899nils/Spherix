name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/1899nils/spherix

jobs:

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build the app in CI (not in Docker) ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared library
        run: pnpm --filter @musicserver/shared build

      - name: Build server
        run: |
          pnpm --filter @musicserver/server prisma:generate
          pnpm --filter @musicserver/server build

      - name: Build web frontend
        run: pnpm --filter @musicserver/web build

      # ── Package into Docker & push ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check GHCR connectivity
        id: ghcr_check
        run: |
          if curl --silent --max-time 15 --head "https://ghcr.io/v2/" | grep -q "HTTP/"; then
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "⚠️  ghcr.io is not reachable from this runner — skipping Docker push"
          fi

      - name: Log in to GHCR
        if: steps.ghcr_check.outputs.reachable == 'true'
        run: |
          for i in 1 2 3; do
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" && break
            echo "Login attempt $i failed — retrying in $((i * 10))s..."
            sleep $((i * 10))
          done

      - name: Extract metadata
        id: meta
        if: steps.ghcr_check.outputs.reachable == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        if: steps.ghcr_check.outputs.reachable == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image (no push)
        if: steps.ghcr_check.outputs.reachable == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
